<!DOCTYPE html>
<html>

 </head>
 <body>
 <h1>AI Chat</h1>
 <p> Welcome to AI Chat</p>
 <input type="text" id="message"placeholder="Type your message">
 <p id="output"></p>
 <button onclick="var msg=document.getElementById('message').value.toLowerCase().trim();if(msg=='Hello'){document.getElementById('output').innerHTML='AI: HeLLO Om Bhai!';}else if(msg=='Kaise ho'){document.getElementById('output').innerHTML='AI: Main badhiya hoon!';}else if(msg=='Tumhar name Kya hai'){document.getElementById('output').innerHTML='AI: Mera name Vision AI hai!';}else{document.getElementById('output').innerHTML='AI: '+msg;}">Send</button>
  </body>
