<!DOCTYPE html>
<html>
<head>
<title>Vision AI Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<h1>🤖 Vision AI Pro</h1>
<p>Welcome to Vision AI Pro</p>
<div id="output" class="chat-box"></div>
<br><br>
<input type="file" id="photo"accept="image/*">
<br><br>
<img id="preview" width="300"style="display:none; border-radius:10px;">
<div id="ocrResult"></div>
<input type="text" id="message" placeholder="Type your message">
<button onclick="reply()">Send</button>
<script>
function reply() {
var msg = document.getElementById("message").value.toLowerCase().trim();
if (msg === "hello") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Hello Om Bhai!</div>";
}
else if (msg === "kaise ho") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Main badhiya hoon!</div>";
}
else if (msg === "tumhara name kya hai") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Mera name Vision AI Pro hai.</div>";
}
else if (msg === "thanks") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Welcome Om Bhai!</div>";
}
else if (msg === "bye") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Bye Om Bhai!</div>";
}
else {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>AI: " + msg + "</div>";
}
}
document.getElementById("photo").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
 const reader = new FileReader();
  reader.onload = function (e) {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
});  
</script>
</body>
</html>
