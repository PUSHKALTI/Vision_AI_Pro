<!DOCTYPE html>
<html>
 <head>
 <title>AI Chat</title>
 </head>
 <body>
 <h1>AI Chat</h1>
 <p> Welcome to AI Chat</p>
 <input type="text" id="message"placeholder="Type your message">
 <button onclick="reply()">Send</button> 
 <p id="output"></p>
<script>
function reply() {
var msg = document.getElementById("message").value.toLowerCase().trim();
if (msg == "hello") {
document.getElementById("output").innerHTML = "AI: Hello Om Bhai!";
}
else if (msg == "kaise ho") {
document.getElementById("output").innerHTML = "AI: Main badhiya hoon!";
}
else if (msg == "tumhara name kya hai") {
document.getElementById("output").innerHTML = "AI: Mera name Vision AI Pro hai.";
}
else if (msg == "bye") {
document.getElementById("output").innerHTML = "AI: Bye Om Bhai!";
 }
else {
document.getElementById("output").innerHTML = "AI: " + msg;
}
}
</script>
</body>
</html>
