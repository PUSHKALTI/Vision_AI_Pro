<!DOCTYPE html>
<html>
 <head>
 <title>AI Chat</title>
 </head>
 <body>
 <h1>AI Chat</h1>
 <p> Welcome to AI Chat</p>
 <input type="text" id="message"placeholder="Type your message">
 <p id="output"></p>
 <button onclick="var msg=document.getElementById('message').value.toLowerCase().trim();if(msg=='Hello'){document.getElementById('output').innerHTML='AI: Hello Om Bhai!';}else if(msg=='Kaise ho'){document.getElementById('output').innerHTML'AI: Main badhiya hoon!';}else if(msg=='tumhara name Kya hai'){document.getElementById('output').innerHTML'AI: Mear name Vision AI Pro hai.';}else if(msg=='Bye'){document.getElementById('output').innerHTML'AI: Bya Om Bhai! Phir milenge.';}else{document.getElementById('output').innerHTML='AI: '+msg;};">Send</button>
  </body>
  </html>
