<!DOCTYPE html>
<html>
<head>
<title>Vision AI Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<h1>🤖 Vision AI Pro</h1>
<p>Welcome to Vision AI Pro</p>
 <h2>AI Image Generator</h2>
 <input type="text" id="imgPrompt" placeholder="Describe the image you want">
 <button id="generateBtn">Generate Image</button>
<div id="output" class="chat-box"></div>
<br><br>
<input type="file" id="photo"accept="image/*">
<br><br>
<img id="preview" width="300"style="display:none; border-radius:10px;">
<div id="ocrResult"></div>
 <button id="explainBtn">Explain</button>
 <div id="solutionBox"></div>
 <div id="explanation"></div>
<input type="text" id="message" placeholder="Type your message">
 <button id="micBtn"> mic</button>
 <h3>Voice Assistant</h3>
 <h3>study Planner S Revision Reminders</h3>
 <input type="text"placeholder="Enter sudject or topic to plan">
 <button>Make Study Plan</button>
 <div id="studyPlanBox"></div>
 <p>Voice mode coming soon</p>
<button onclick="reply()">Send</button>
<script>
 document.getElementById("explainBtn").onclick = function () {
 const text = document.getElementById("ocrResult").innerText.trim();
  if (text) {
  document.getElementById("solutionBox").innerText =
  document.getElementById("explanation").innerText =
  "Step-by-step solution (Demo):\n1. Question read.\n2. OCR completed.\n3. AI explanation generated.";  
  } else {
  alert("Pehle ek photo upload karke OCR chalao.");
   }
   };
document.getElementById("photo").addEventListener("change", async function () {
const file = this.files[0];
 if (!file) return;
document.getElementById("ocrResult").innerText = "Reading text...";
const result = await Tesseract.recognize(file, "eng");
 document.getElementById("ocrResult").innerText = result.data.text;
});
function reply() {
var msg = document.getElementById("message").value.toLowerCase().trim();
if (msg === "hello") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Hello Om Bhai!</div>";
}
else if (msg === "kaise ho") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Main badhiya hoon!</div>";
}
else if (msg === "tumhara name kya hai") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Mera name Vision AI Pro hai.</div>";
}
else if (msg === "thanks") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Welcome Om Bhai!</div>";
}
else if (msg === "bye") {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>Bye Om Bhai!</div>";
}
else {
document.getElementById("output").innerHTML = "<div class='ai-msg'> Vision AI Pro<br>AI: " + msg + "</div>";
}
}
document.getElementById("photo").addEventListener("change", function () {
  const file = this.files[0];
  if (!file) return;
 const reader = new FileReader();
  reader.onload = function (e) {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display = "block";
   };
  reader.readAsDataURL(file);
});
 document.getElementById("generateBtn").onclick = function () {
  alert("AI Image Generator Demo Ready!");
};
</script>
</body>
</html>
