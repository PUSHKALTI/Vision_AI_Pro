<!DOCTYPE html>
<html>
 <head>
 <title>AI Chat</title>
 </head>
 <body>
 <h1>AI Chat</h1>
 <p> Welcome to AI Chat</p>
 <input type="text" id="message"placeholder="Type your message">
 <p id="output"></p>
  <button onclick="letmsg=document.getElementById('message').value; if(msg=='Hello'){document.getElementById('output').innerHTML='AI: Hello Om Bhai!';}else if(msg=='Kaise ho'){document.getElementById('output').innerHTML='AI: Main badhiya hoon!';} else{document.getElementById('output').innerHTML='AI: '+msg;}">Send</button>
 </body>
 </html>
